{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <h2><i class="bi bi-currency-dollar"></i> {{ page_title }}</h2>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Object Num *</label>
                        <input type="number" name="object_num" class="form-control" required 
                               value="{{ price.objectNum|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label>Definição do Menu Item *</label>
                        <select name="def_obj_num" class="form-control" required>
                            <option value="">Selecione...</option>
                            {% for def in definitions %}
                            <option value="{{ def.objectNum }}" 
                                {% if price.menuItemDefObjNum == def.objectNum %}selected{% endif %}>
                                {{ def.objectNum }} - {{ def.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Preço *</label>
                        <input type="number" step="0.01" name="price" class="form-control" required 
                               value="{{ price.price|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label>Moeda</label>
                        <select name="currency" class="form-control">
                            <option value="BRL" {% if price.currency == 'BRL' %}selected{% endif %}>BRL - Real</option>
                            <option value="USD" {% if price.currency == 'USD' %}selected{% endif %}>USD - Dólar</option>
                            <option value="EUR" {% if price.currency == 'EUR' %}selected{% endif %}>EUR - Euro</option>
                        </select>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" 
                               {% if price.isActive %}checked{% endif %}>
                        <label class="form-check-label">Ativo</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="{% url 'simphony:menu_item_price' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

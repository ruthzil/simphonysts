{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <h2><i class="bi bi-grid-3x3-gap-fill"></i> {{ page_title }}</h2>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Object Num *</label>
                        <input type="number" name="object_num" class="form-control" required 
                               value="{{ menu_item.objectNum|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label>Hier Unit ID *</label>
                        <input type="number" name="hier_unit_id" class="form-control" required 
                               value="1">
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label>Nome (Português) *</label>
                                <input type="text" name="name_pt" class="form-control" required 
                                       value="{{ menu_item.name.pt-BR|default:'' }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label>Nome (Inglês) *</label>
                                <input type="text" name="name_en" class="form-control" required 
                                       value="{{ menu_item.name.en-US|default:'' }}">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Preço *</label>
                        <input type="number" step="0.01" name="price" class="form-control" required 
                               value="{{ menu_item.price|default:'0' }}">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="active" class="form-check-input" 
                               {% if menu_item.active %}checked{% endif %}>
                        <label class="form-check-label">Ativo</label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Salvar
                    </button>
                    <a href="{% url 'simphony:menu_item_master' %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
